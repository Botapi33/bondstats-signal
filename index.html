<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BondStats Signal V8</title>

<style>
body{
    margin:0;
    font-family:-apple-system,Segoe UI;
    background:#04070b;
    color:#e6edf3;
}
.wrap{
    max-width:600px;
    margin:auto;
    padding:20px;
}
.card{
    background:#0b1117;
    border-radius:18px;
    padding:20px;
    border:1px solid rgba(255,255,255,0.05);
}

/* HEADER */
.regime{
    font-size:28px;
    font-weight:800;
}
.meta{
    font-size:14px;
    color:#9aa4b2;
    margin-top:5px;
}
.time{
    font-size:12px;
    color:#6e7681;
    margin-top:4px;
}

/* BLOCKS */
.block{
    margin-top:18px;
    padding:14px;
    border-radius:12px;
    background:rgba(255,255,255,0.03);
}

.title{
    font-size:11px;
    color:#8b949e;
    letter-spacing:1.5px;
}

.value{
    font-size:18px;
    font-weight:700;
    margin-top:6px;
}

.sub{
    font-size:12px;
    color:#9aa4b2;
    margin-top:4px;
}

.green{color:#3fb950;}
.red{color:#f85149;}
.gray{color:#9aa4b2;}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<div id="regime" class="regime">Loading...</div>
<div id="meta" class="meta"></div>
<div id="time" class="time"></div>

<div class="block">
<div class="title">MOMENTUM</div>
<div id="momentum" class="value"></div>
<div id="momentumTrend" class="sub"></div>
</div>

<div class="block">
<div class="title">TREND STABILITY</div>
<div id="stability" class="value"></div>
<div id="stabilityTrend" class="sub"></div>
</div>

<div class="block">
<div class="title">REVERSAL RISK</div>
<div id="reversal" class="value"></div>
</div>

<div class="block">
<div class="title">OUTLOOK</div>
<div id="outlook" class="value"></div>
</div>

</div>
</div>

<script>

const API="https://botapi33.github.io/bondstats-global-yields/global_yields.json";

async function load(){

const res = await fetch(API + "?t=" + Date.now());
const data = await res.json();

const countries = Object.values(data.countries || {});

/* ---------- CALC ---------- */

let up=0, down=0, absSum=0;

countries.forEach(c=>{
    if(c.change>0) up++;
    if(c.change<0) down++;
    absSum += Math.abs(c.change || 0);
});

const total = countries.length;

const dominance = Math.abs(up-down)/total;
const avgMove = absSum/total;

/* ---------- REGIME ---------- */

let regime="DIVERGING";

if(up>down) regime="TIGHTENING";
if(down>up) regime="EASING";

/* ---------- MOMENTUM ---------- */

let momentum="LOW";
if(avgMove > 0.3) momentum="HIGH";
else if(avgMove > 0.15) momentum="MEDIUM";

/* ---------- STABILITY ---------- */

let stability="LOW";
if(dominance > 0.6) stability="HIGH";
else if(dominance > 0.3) stability="MEDIUM";

/* ---------- REVERSAL ---------- */

let reversal="LOW";

if(momentum==="HIGH" && stability==="LOW") reversal="HIGH";
else if(stability==="LOW") reversal="MEDIUM";

/* ---------- LOAD PREVIOUS ---------- */

let prev = JSON.parse(localStorage.getItem("bondstats_signal") || "{}");

/* ---------- TRENDS ---------- */

function trendText(current, previous){
    if(!previous) return "—";

    if(current > previous) return "↑ strengthening";
    if(current < previous) return "↓ weakening";
    return "→ unchanged";
}

/* ---------- STORE ---------- */

localStorage.setItem("bondstats_signal", JSON.stringify({
    avgMove,
    dominance,
    time: Date.now()
}));

/* ---------- OUTLOOK ---------- */

let outlook="UNCLEAR";

if(regime==="TIGHTENING" && momentum==="HIGH"){
    outlook="Upward pressure likely to persist";
}
else if(regime==="EASING" && momentum==="HIGH"){
    outlook="Downward pressure building";
}
else if(stability==="LOW"){
    outlook="Unstable conditions — reversal risk elevated";
}

/* ---------- TIME ---------- */

const now = new Date();

document.getElementById("time").innerText =
"Updated: " + now.toLocaleString();

/* ---------- UI ---------- */

document.getElementById("regime").innerText = regime;
document.getElementById("meta").innerText =
`${up} rising • ${down} falling`;

document.getElementById("momentum").innerText = momentum;
document.getElementById("stability").innerText = stability;
document.getElementById("reversal").innerText = reversal;
document.getElementById("outlook").innerText = outlook;

/* ---------- TREND UI ---------- */

document.getElementById("momentumTrend").innerText =
trendText(avgMove, prev.avgMove);

document.getElementById("stabilityTrend").innerText =
trendText(dominance, prev.dominance);

}

load();

</script>

</body>
</html>
