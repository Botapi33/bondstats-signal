<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BondStats Macro Pulse</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0b1d3a, #02070f);
  color:white;
}

.container {
  max-width: 800px;
  margin: 40px auto;
  padding: 16px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 18px;
  padding: 24px;
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

h1 {
  font-size: 26px;
  margin-bottom: 10px;
}

.signal {
  font-size: 32px;
  font-weight: 700;
  margin: 10px 0;
}

.action {
  padding: 14px;
  border-radius: 12px;
  font-weight: 600;
  margin: 16px 0;
}

.green { background: rgba(34,197,94,0.2); color:#86efac; }
.red { background: rgba(239,68,68,0.2); color:#fca5a5; }
.gray { background: rgba(255,255,255,0.08); }

.grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:16px;
  margin-top:20px;
}

.box {
  background: rgba(255,255,255,0.04);
  padding:14px;
  border-radius:10px;
}

.label {
  font-size:12px;
  opacity:0.6;
}

.value {
  font-size:18px;
  margin-top:4px;
}

@media(max-width:600px){
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>BondStats Macro Pulse</h1>
    <div id="content">Loading...</div>
  </div>
</div>

<script>
const url = "https://botapi33.github.io/bondstats-global-yields/global_yields.json";

fetch(url)
.then(res => res.json())
.then(data => {

  const valid = data.filter(d => d.change !== null);

  const rising = valid.filter(d => d.change > 0);
  const falling = valid.filter(d => d.change < 0);

  const breadth = Math.round((rising.length / valid.length) * 100);

  const avgMove = (valid.reduce((sum,d)=>sum+d.change,0)/valid.length).toFixed(2);

  let signal = "MIXED";
  let action = "Neutral positioning — no clear global trend";
  let color = "gray";

  if (breadth > 60) {
    signal = "TIGHTENING";
    action = "Rates rising — reduce duration exposure";
    color = "red";
  }

  if (breadth < 40) {
    signal = "EASING";
    action = "Rates falling — extend duration exposure";
    color = "green";
  }

  const topDrivers = valid
    .sort((a,b)=>Math.abs(b.change)-Math.abs(a.change))
    .slice(0,3)
    .map(d => d.country)
    .join(", ");

  document.getElementById("content").innerHTML = `
    <div class="signal">${signal}</div>
    <div class="action ${color}">${action}</div>

    <div class="grid">
      <div class="box">
        <div class="label">Breadth</div>
        <div class="value">${breadth}% rising</div>
      </div>

      <div class="box">
        <div class="label">Average Move</div>
        <div class="value">${avgMove} pp</div>
      </div>

      <div class="box">
        <div class="label">Markets</div>
        <div class="value">${valid.length}</div>
      </div>

      <div class="box">
        <div class="label">Top Drivers</div>
        <div class="value">${topDrivers}</div>
      </div>
    </div>
  `;
});
</script>

</body>
</html>
