<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BondStats Signal</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
    background:#070b10;
    color:#e6edf3;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.wrapper{
    width:100%;
    max-width:420px;
    padding:20px;
}

.card{
    background:linear-gradient(180deg,#0d131a,#0a0f14);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:16px;
    padding:24px;
    box-shadow:0 25px 70px rgba(0,0,0,0.7);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.label{
    font-size:11px;
    color:#8b949e;
    letter-spacing:1.5px;
}

.pulse{
    width:8px;
    height:8px;
    background:#3fb950;
    border-radius:50%;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:0.3;}
    50%{opacity:1;}
    100%{opacity:0.3;}
}

/* MAIN */
.main{
    font-size:28px;
    font-weight:700;
    margin-top:12px;
}

.rising{color:#3fb950;}
.falling{color:#f85149;}
.mixed{color:#9aa4b2;}

.coverage{
    font-size:14px;
    color:#9aa4b2;
    margin-top:6px;
}

/* MOVERS */
.section{
    margin-top:20px;
    font-size:12px;
    color:#8b949e;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
}

.up{color:#3fb950;}
.down{color:#f85149;}

/* HEATMAP */
.heatmap{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
    margin-top:15px;
}

.box{
    padding:6px;
    font-size:10px;
    text-align:center;
    border-radius:6px;
}

.box.up{background:rgba(63,185,80,0.2);}
.box.down{background:rgba(248,81,73,0.2);}
.box.flat{background:rgba(154,164,178,0.2);}

.loader{
    width:18px;
    height:18px;
    border:3px solid #2a3643;
    border-top:3px solid #4da3ff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="card">

<div class="header">
    <div class="label">BONDSTATS SIGNAL</div>
    <div class="pulse"></div>
</div>

<div id="main" class="main"><div class="loader"></div></div>
<div id="coverage" class="coverage"></div>

<div class="section">Top Movers</div>
<div id="movers"></div>

<div class="section">Market Heatmap</div>
<div id="heatmap" class="heatmap"></div>

</div>

</div>

<script>

const API="https://botapi33.github.io/bondstats-global-yields/global_yields.json";

async function load(){

    const res=await fetch(API+"?t="+Date.now());
    const data=await res.json();

    const s=data.signal;
    const countries=data.countries;

    const main=document.getElementById("main");
    const coverage=document.getElementById("coverage");
    const movers=document.getElementById("movers");
    const heatmap=document.getElementById("heatmap");

    // MAIN
    main.innerText=s.direction.toUpperCase()+" • "+s.strength.toUpperCase();
    main.classList.add(s.direction.toLowerCase());

    coverage.innerText=s.coverage+"% of markets moving "+s.direction.toLowerCase();

    // MOVERS
    let mHTML="";
    s.topMovers.forEach(m=>{
        let cls=m.change>=0?"up":"down";
        let sign=m.change>0?"+":"";
        mHTML+=`<div class="row"><div>${m.country}</div><div class="${cls}">${sign}${m.change}%</div></div>`;
    });
    movers.innerHTML=mHTML;

    // HEATMAP
    let hHTML="";
    Object.values(countries).forEach(c=>{
        let cls="flat";
        if(c.change>0) cls="up";
        if(c.change<0) cls="down";

        hHTML+=`<div class="box ${cls}">${c.label.slice(0,3)}</div>`;
    });

    heatmap.innerHTML=hHTML;
}

load();

</script>

</body>
</html>
