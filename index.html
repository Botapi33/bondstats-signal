<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BondStats Signal V3</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
    background:#070b10;
    color:#e6edf3;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.wrapper{
    width:100%;
    max-width:420px;
    padding:20px;
}

.card{
    background:linear-gradient(180deg,#0d131a,#0a0f14);
    border-radius:16px;
    padding:24px;
    box-shadow:0 25px 70px rgba(0,0,0,0.7);
}

.header{
    display:flex;
    justify-content:space-between;
}

.label{
    font-size:11px;
    color:#8b949e;
}

.main{
    font-size:26px;
    font-weight:700;
    margin-top:10px;
}

.coverage{
    font-size:14px;
    color:#9aa4b2;
}

/* HEATMAP */
.heatmap{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
    margin-top:20px;
}

.box{
    padding:8px;
    border-radius:6px;
    font-size:10px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
}

.box:hover{
    transform:scale(1.1);
}

.up{background:rgba(63,185,80,0.2);}
.down{background:rgba(248,81,73,0.2);}
.flat{background:rgba(154,164,178,0.2);}

/* DETAIL PANEL */
.detail{
    margin-top:20px;
    padding:14px;
    border-radius:10px;
    background:#0b1117;
    font-size:14px;
}

.highlight{
    border:1px solid #4da3ff;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="card">

<div class="header">
    <div class="label">BONDSTATS SIGNAL</div>
</div>

<div id="main" class="main">Loading...</div>
<div id="coverage" class="coverage"></div>

<div class="heatmap" id="heatmap"></div>

<div id="detail" class="detail">
Click a country to see details
</div>

</div>

</div>

<script>

const API="https://botapi33.github.io/bondstats-global-yields/global_yields.json";

async function load(){

    const res=await fetch(API+"?t="+Date.now());
    const data=await res.json();

    const s=data.signal;
    const countries=data.countries;

    document.getElementById("main").innerText=
        s.direction.toUpperCase()+" • "+s.strength.toUpperCase();

    document.getElementById("coverage").innerText=
        s.coverage+"% of markets moving "+s.direction.toLowerCase();

    const heatmap=document.getElementById("heatmap");
    const detail=document.getElementById("detail");

    Object.values(countries).forEach(c=>{

        let cls="flat";
        if(c.change>0) cls="up";
        if(c.change<0) cls="down";

        let el=document.createElement("div");
        el.className="box "+cls;

        // Highlight USA
        if(c.label==="United States"){
            el.classList.add("highlight");
        }

        el.innerText=c.label.slice(0,3);

        el.onclick=()=>{
            detail.innerHTML=`
            <b>${c.label}</b><br><br>
            Yield: ${c.value ?? "--"}%<br>
            Change: ${c.change ?? "--"}<br>
            Source: ${c.source}
            `;
        };

        heatmap.appendChild(el);

    });

}

load();

</script>

</body>
</html>
