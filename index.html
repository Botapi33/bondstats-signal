<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BondStats – Global Divergence</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system;
  background: radial-gradient(circle at top, #0b1d3a, #02070f);
  color: white;
}

.container {
  max-width: 900px;
  margin: 60px auto;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 28px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
}

h1 {
  font-size: 28px;
  margin-bottom: 8px;
}

.subtitle {
  color: rgba(255,255,255,0.6);
  margin-bottom: 20px;
}

.region {
  margin-bottom: 20px;
}

.region-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}

.bar {
  height: 6px;
  border-radius: 4px;
  background: rgba(255,255,255,0.1);
  overflow: hidden;
}

.fill {
  height: 100%;
  background: linear-gradient(90deg, #6ee7b7, #22c55e);
}

.label {
  margin-top: 6px;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>Global Rate Divergence</h1>
    <div class="subtitle">Where yields are moving globally</div>

    <div id="content">Loading...</div>

  </div>
</div>

<script>
const url = "https://botapi33.github.io/bondstats-global-yields/global_yields.json";

fetch(url)
.then(res => res.json())
.then(data => {

  const regions = {
    "North America": [],
    "Europe": [],
    "Asia": [],
    "Latin America": [],
    "Africa": [],
    "Other": []
  };

  data.forEach(d => {
    if (!d.region) return;
    if (!regions[d.region]) regions["Other"].push(d);
    else regions[d.region].push(d);
  });

  let html = "";

  Object.keys(regions).forEach(region => {
    const items = regions[region];
    if (!items.length) return;

    const rising = items.filter(i => i.change > 0).length;
    const percent = Math.round((rising / items.length) * 100);

    let label = "Mixed";
    if (percent > 60) label = "Rising";
    if (percent < 40) label = "Falling";

    html += `
      <div class="region">
        <div class="region-title">${region} — ${label}</div>
        <div class="bar">
          <div class="fill" style="width:${percent}%"></div>
        </div>
        <div class="label">${percent}% of markets rising</div>
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;

});
</script>

</body>
</html>
