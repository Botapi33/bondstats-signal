<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BondStats Signal</title>

<style>
body{
    margin:0;
    font-family:-apple-system,Segoe UI;
    background:#05080d;
    color:#e6edf3;
}

.container{
    max-width:620px;
    margin:auto;
    padding:20px;
}

.card{
    background:#0b1117;
    border-radius:18px;
    padding:22px;
    border:1px solid rgba(255,255,255,0.05);
}

/* HEADER */
.regime{
    font-size:28px;
    font-weight:800;
}

.meta{
    margin-top:6px;
    font-size:14px;
    color:#9aa4b2;
}

.submeta{
    margin-top:4px;
    font-size:12px;
    color:#6e7681;
}

/* SIGNAL */
.signal{
    margin-top:18px;
    padding:14px;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    background:linear-gradient(
        90deg,
        rgba(255,255,255,0.06),
        rgba(255,255,255,0.02)
    );
}

/* BLOCK */
.block{
    margin-top:18px;
}

.label{
    font-size:11px;
    letter-spacing:1.5px;
    color:#8b949e;
}

.value{
    margin-top:6px;
    font-size:18px;
    font-weight:700;
}

.sub{
    font-size:13px;
    color:#9aa4b2;
    margin-top:4px;
}

.history{
    margin-top:10px;
    font-size:13px;
    color:#9aa4b2;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div id="regime" class="regime">Loading...</div>
<div id="meta" class="meta"></div>
<div class="submeta">Global coverage • mixed update timing</div>

<div id="signal" class="signal"></div>

<div class="block">
<div class="label">CONVICTION</div>
<div id="conviction" class="value"></div>
</div>

<div class="block">
<div class="label">TOP DRIVERS</div>
<div id="drivers" class="sub"></div>
</div>

<div class="block">
<div class="label">TREND</div>
<div id="trend" class="value"></div>
</div>

<div class="block">
<div class="label">7D HISTORY</div>
<div id="history" class="history"></div>
</div>

</div>
</div>

<script>

const API="https://botapi33.github.io/bondstats-global-yields/global_yields.json";
const STORAGE_KEY="bondstats_history";

/* ---------- LOAD ---------- */

async function load(){

const res = await fetch(API + "?t=" + Date.now());
const data = await res.json();

const countries = Object.entries(data.countries);

/* ---------- CALC ---------- */

let up=[], down=[];

countries.forEach(([name,c])=>{
    if(c.change>0) up.push({name,val:c.change});
    if(c.change<0) down.push({name,val:c.change});
});

const total = countries.length;

const dominance = Math.abs(up.length - down.length)/total;
const avgMove = countries.reduce((a,[,c])=>a+Math.abs(c.change||0),0)/total;

/* ---------- REGIME ---------- */

let regime="MIXED";

if(up.length > down.length*1.3) regime="TIGHTENING";
if(down.length > up.length*1.3) regime="EASING";

/* ---------- CONVICTION ---------- */

let conviction = Math.round((dominance*0.6 + avgMove*0.4)*100);

/* ---------- SIGNAL TEXT ---------- */

let signalText="Balanced conditions across global bond markets";

if(regime==="TIGHTENING"){
    signalText="Global yields are trending higher — duration risk increasing";
}
else if(regime==="EASING"){
    signalText="Global yields are declining — duration exposure becoming more attractive";
}

/* ---------- DRIVERS ---------- */

const movers = [...up, ...down]
.sort((a,b)=>Math.abs(b.val)-Math.abs(a.val))
.slice(0,3)
.map(x=>x.name.replace("_"," "))
.join(", ");

/* ---------- HISTORY ---------- */

let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

const today = new Date().toISOString().slice(0,10);

if(history.length === 0 || history[history.length-1].date !== today){
    history.push({date: today, regime});
}

history = history.slice(-7);
localStorage.setItem(STORAGE_KEY, JSON.stringify(history));

/* ---------- TREND ---------- */

function analyzeTrend(history){

if(history.length < 3) return "Building signal";

const last = history.slice(-3).map(x=>x.regime);

if(last.every(r => r === "TIGHTENING"))
    return "Upward pressure strengthening";

if(last.every(r => r === "EASING"))
    return "Downward pressure building";

if(new Set(last).size > 1)
    return "Possible turning point";

return "Stable conditions";
}

const trend = analyzeTrend(history);

/* ---------- RENDER HISTORY ---------- */

let historyHTML="";

history.forEach(h=>{
    historyHTML += `${h.date} — ${h.regime}<br>`;
});

/* ---------- UI ---------- */

document.getElementById("regime").innerText = regime;

document.getElementById("meta").innerText =
`${up.length} rising • ${down.length} falling`;

document.getElementById("signal").innerText = signalText;

document.getElementById("conviction").innerText =
conviction + "/100";

document.getElementById("drivers").innerText =
movers || "—";

document.getElementById("trend").innerText =
trend;

document.getElementById("history").innerHTML =
historyHTML;

}

load();

</script>

</body>
</html>
