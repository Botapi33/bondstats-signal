<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BondStats Signal V5</title>

<style>
body{
    margin:0;
    font-family:-apple-system,Segoe UI,Roboto;
    background:#05080c;
    color:#e6edf3;
}

/* CONTAINER */
.wrap{
    max-width:600px;
    margin:auto;
    padding:20px;
}

/* CARD */
.card{
    background:linear-gradient(180deg,#0d131a,#0a0f14);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:18px;
    padding:20px;
}

/* HEADER */
.label{
    font-size:11px;
    color:#8b949e;
    letter-spacing:1.5px;
}

.regime{
    font-size:28px;
    font-weight:800;
    margin-top:10px;
}

.tightening{color:#3fb950;}
.easing{color:#f85149;}
.diverging{color:#9aa4b2;}

.confidence{
    margin-top:5px;
    font-size:14px;
    color:#9aa4b2;
}

/* STORY */
.story{
    margin-top:18px;
    padding:14px;
    background:rgba(255,255,255,0.03);
    border-radius:12px;
    line-height:1.5;
}

/* ALERTS */
.alerts{
    margin-top:18px;
}

.alert{
    padding:10px;
    border-radius:10px;
    margin-bottom:8px;
    font-size:14px;
    background:rgba(255,255,255,0.03);
}

/* LOADER */
.loader{
    width:18px;
    height:18px;
    border:3px solid #2a3643;
    border-top:3px solid #4da3ff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<div class="label">GLOBAL BOND SIGNAL</div>

<div id="regime" class="regime">
<div class="loader"></div>
</div>

<div id="confidence" class="confidence"></div>

<div id="story" class="story"></div>

<div id="alerts" class="alerts"></div>

</div>
</div>

<script>

const API="https://botapi33.github.io/bondstats-global-yields/global_yields.json";

async function load(){

    const res = await fetch(API + "?t=" + Date.now());
    const data = await res.json();

    const countries = Object.values(data.countries || {});

    let up = 0, down = 0;

    countries.forEach(c=>{
        if(c.change > 0) up++;
        if(c.change < 0) down++;
    });

    const total = countries.length;
    const dominance = Math.abs(up - down) / total;

    let regime="DIVERGING";
    let cls="diverging";

    if(up > down){
        regime="TIGHTENING";
        cls="tightening";
    }

    if(down > up){
        regime="EASING";
        cls="easing";
    }

    const confidence = Math.round(dominance * 100);

    // STORY ENGINE (🔥 KEY)
    let story="";

    if(regime==="TIGHTENING"){
        story = "Global bond yields are rising across major economies, indicating increasing rate pressure and tightening financial conditions.";
    }

    if(regime==="EASING"){
        story = "Global bond yields are falling, suggesting easing financial conditions and potential shifts toward accommodative policy.";
    }

    if(regime==="DIVERGING"){
        story = "Bond markets are showing mixed signals, with no clear global direction. Regional divergence suggests uncertainty in macro conditions.";
    }

    // ALERTS
    const movers = countries
        .sort((a,b)=>Math.abs(b.change)-Math.abs(a.change))
        .slice(0,3);

    const alerts = movers.map(c=>{
        return `${c.label}: ${c.change > 0 ? "+" : ""}${c.change}%`;
    });

    // UI UPDATE
    const regimeEl = document.getElementById("regime");
    regimeEl.innerText = regime;
    regimeEl.className = "regime " + cls;

    document.getElementById("confidence").innerText =
        "Confidence: " + confidence + "%";

    document.getElementById("story").innerText = story;

    const alertsEl = document.getElementById("alerts");
    alertsEl.innerHTML = "<div class='label'>KEY MOVES</div>";

    alerts.forEach(a=>{
        const el = document.createElement("div");
        el.className = "alert";
        el.innerText = a;
        alertsEl.appendChild(el);
    });
}

load();

</script>

</body>
</html>
