<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BondStats Signal</title>

<style>
body{
    margin:0;
    font-family:-apple-system,Segoe UI;
    background:#05080d;
    color:#e6edf3;
}

.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

.card{
    background:#0b1117;
    border-radius:18px;
    padding:22px;
    border:1px solid rgba(255,255,255,0.05);
}

/* HEADLINE */
.regime{
    font-size:30px;
    font-weight:800;
}

.meta{
    margin-top:6px;
    font-size:14px;
    color:#9aa4b2;
}

.updated{
    margin-top:4px;
    font-size:12px;
    color:#6e7681;
}

/* SIGNAL */
.signal{
    margin-top:20px;
    padding:16px;
    border-radius:12px;
    font-size:18px;
    font-weight:600;
}

.buy{ background:rgba(63,185,80,0.15); color:#3fb950;}
.sell{ background:rgba(248,81,73,0.15); color:#f85149;}
.neutral{ background:rgba(255,255,255,0.05);}

/* BLOCK */
.block{
    margin-top:18px;
}

.label{
    font-size:11px;
    letter-spacing:1.5px;
    color:#8b949e;
}

.value{
    margin-top:6px;
    font-size:18px;
    font-weight:700;
}

.sub{
    font-size:13px;
    color:#9aa4b2;
    margin-top:4px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div id="regime" class="regime">Loading...</div>
<div id="meta" class="meta"></div>
<div id="updated" class="updated"></div>

<div id="signal" class="signal"></div>

<div class="block">
<div class="label">CONVICTION</div>
<div id="conviction" class="value"></div>
</div>

<div class="block">
<div class="label">TOP DRIVERS</div>
<div id="drivers" class="sub"></div>
</div>

</div>
</div>

<script>

const API="https://botapi33.github.io/bondstats-global-yields/global_yields.json";

async function load(){

const res = await fetch(API + "?t=" + Date.now());
const data = await res.json();

const countries = Object.entries(data.countries);

/* ----------- CALC ----------- */

let up=[], down=[];

countries.forEach(([name,c])=>{
    if(c.change>0) up.push({name,val:c.change});
    if(c.change<0) down.push({name,val:c.change});
});

const total = countries.length;

const dominance = Math.abs(up.length - down.length)/total;
const avgMove = countries.reduce((a,[,c])=>a+Math.abs(c.change||0),0)/total;

/* ----------- REGIME ----------- */

let regime="MIXED";

if(up.length > down.length*1.3) regime="TIGHTENING";
if(down.length > up.length*1.3) regime="EASING";

/* ----------- CONVICTION ----------- */

let conviction = Math.round((dominance*0.6 + avgMove*0.4)*100);

/* ----------- SIGNAL ----------- */

let signalText="Stay neutral";
let signalClass="neutral";

if(regime==="TIGHTENING"){
    signalText="Rates rising → reduce duration exposure";
    signalClass="sell";
}
else if(regime==="EASING"){
    signalText="Rates falling → extend duration exposure";
    signalClass="buy";
}

/* ----------- DRIVERS ----------- */

const movers = [...up, ...down]
.sort((a,b)=>Math.abs(b.val)-Math.abs(a.val))
.slice(0,3)
.map(x=>x.name)
.join(", ");

/* ----------- DATE ----------- */

let latestDate="";

countries.forEach(([_,c])=>{
    if(c.date > latestDate) latestDate = c.date;
});

/* ----------- UI ----------- */

document.getElementById("regime").innerText = regime;

document.getElementById("meta").innerText =
`${up.length} rising • ${down.length} falling`;

document.getElementById("updated").innerText =
"Data: " + latestDate;

const signalEl = document.getElementById("signal");
signalEl.innerText = signalText;
signalEl.className = "signal " + signalClass;

document.getElementById("conviction").innerText =
conviction + "/100";

document.getElementById("drivers").innerText =
movers || "—";

}

load();

</script>

</body>
</html>
