<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:-apple-system,Segoe UI;
    background:#05080d;
    color:#e6edf3;
}

.wrap{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* HEADER */
.header{
    margin-bottom:20px;
}

.title{
    font-size:28px;
    font-weight:800;
}

.meta{
    color:#9aa4b2;
    margin-top:6px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
}

.box{
    padding:12px;
    border-radius:10px;
    font-size:13px;
    background:#0b1117;
    border:1px solid rgba(255,255,255,0.05);
}

/* COLORS */
.up{
    background:rgba(63,185,80,0.15);
}

.down{
    background:rgba(248,81,73,0.15);
}

.flat{
    background:rgba(255,255,255,0.05);
}

.country{
    font-weight:600;
}

.value{
    font-size:12px;
    margin-top:4px;
    color:#9aa4b2;
}

/* BAR */
.bar{
    margin-top:20px;
    height:8px;
    border-radius:10px;
    background:#111;
    overflow:hidden;
}

.fill{
    height:100%;
    background:#3fb950;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<div id="title" class="title">Loading...</div>
<div id="meta" class="meta"></div>

<div class="bar">
<div id="bar" class="fill"></div>
</div>

</div>

<div id="grid" class="grid"></div>

</div>

<script>

const API="https://botapi33.github.io/bondstats-global-yields/global_yields.json";

async function load(){

const res = await fetch(API + "?t=" + Date.now());
const data = await res.json();

const countries = Object.entries(data.countries);

let up=0, down=0;

/* SORT BY MOVE */
countries.sort((a,b)=>Math.abs(b[1].change)-Math.abs(a[1].change));

/* COUNTS */
countries.forEach(([_,c])=>{
    if(c.change>0) up++;
    if(c.change<0) down++;
});

const total = countries.length;
const upPct = Math.round((up/total)*100);

/* HEADER */
let regime="Mixed";

if(up > down*1.3) regime="Global tightening";
if(down > up*1.3) regime="Global easing";

document.getElementById("title").innerText = regime;

document.getElementById("meta").innerText =
`${up} rising • ${down} falling • ${total} markets`;

document.getElementById("bar").style.width = upPct + "%";

/* GRID */
const grid = document.getElementById("grid");

countries.slice(0,30).forEach(([name,c])=>{

let cls="flat";

if(c.change > 0) cls="up";
if(c.change < 0) cls="down";

const el = document.createElement("div");
el.className="box " + cls;

el.innerHTML = `
<div class="country">${name.replace("_"," ")}</div>
<div class="value">${c.yield}% • ${c.change > 0 ? "+" : ""}${c.change}%</div>
`;

grid.appendChild(el);

});

}

load();

</script>

</body>
</html>
