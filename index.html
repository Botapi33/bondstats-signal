<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BondStats Signal V6</title>

<style>
body{
    margin:0;
    font-family:-apple-system,Segoe UI,Roboto;
    background:#05080c;
    color:#e6edf3;
}

.wrap{
    max-width:600px;
    margin:auto;
    padding:20px;
}

.card{
    background:linear-gradient(180deg,#0d131a,#0a0f14);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:18px;
    padding:20px;
}

/* HEADER */
.label{
    font-size:11px;
    color:#8b949e;
    letter-spacing:1.5px;
}

.regime{
    font-size:30px;
    font-weight:800;
    margin-top:10px;
}

.tightening{color:#3fb950;}
.easing{color:#f85149;}
.diverging{color:#9aa4b2;}

.conf{
    font-size:14px;
    color:#9aa4b2;
    margin-top:4px;
}

/* ALERTS */
.section{
    margin-top:20px;
}

.alert{
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    font-size:14px;
    line-height:1.4;
}

.high{
    background:rgba(248,81,73,0.15);
}

.medium{
    background:rgba(255,184,0,0.15);
}

.low{
    background:rgba(63,185,80,0.15);
}

/* STORY */
.story{
    margin-top:15px;
    padding:14px;
    background:rgba(255,255,255,0.03);
    border-radius:12px;
    line-height:1.5;
}

/* LOADER */
.loader{
    width:18px;
    height:18px;
    border:3px solid #2a3643;
    border-top:3px solid #4da3ff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<div class="label">GLOBAL BOND SIGNAL</div>

<div id="regime" class="regime">
<div class="loader"></div>
</div>

<div id="conf" class="conf"></div>

<div id="story" class="story"></div>

<div class="section">
<div class="label">MARKET ALERTS</div>
<div id="alerts"></div>
</div>

</div>
</div>

<script>

const API="https://botapi33.github.io/bondstats-global-yields/global_yields.json";

async function load(){

const res = await fetch(API + "?t=" + Date.now());
const data = await res.json();

const countries = Object.values(data.countries || {});

let up=0, down=0;

countries.forEach(c=>{
    if(c.change>0) up++;
    if(c.change<0) down++;
});

const total = countries.length;
const dominance = Math.abs(up-down)/total;

let regime="DIVERGING";
let cls="diverging";

if(up>down){
    regime="TIGHTENING";
    cls="tightening";
}
if(down>up){
    regime="EASING";
    cls="easing";
}

const confidence = Math.round(dominance*100);

/* ------------------ ALERT ENGINE ------------------ */

let alerts=[];

/* BREAKOUT */
if(up/total > 0.7){
    alerts.push({
        text:"⚠️ Broad yield breakout — majority of markets moving higher",
        level:"high"
    });
}

if(down/total > 0.7){
    alerts.push({
        text:"⚠️ Broad easing — yields falling across markets",
        level:"high"
    });
}

/* EXTREME MOVES */
const movers = countries
.sort((a,b)=>Math.abs(b.change)-Math.abs(a.change))
.slice(0,3);

movers.forEach(c=>{
    if(Math.abs(c.change) > 0.5){
        alerts.push({
            text:`🚨 ${c.label} large move (${c.change>0?"+":""}${c.change}%)`,
            level:"medium"
        });
    }
});

/* DIVERGENCE */
if(up>0 && down>0 && dominance < 0.3){
    alerts.push({
        text:"🔀 Market divergence increasing across regions",
        level:"medium"
    });
}

/* DEFAULT */
if(alerts.length===0){
    alerts.push({
        text:"No significant market stress detected",
        level:"low"
    });
}

/* ------------------ STORY ------------------ */

let story="";

if(regime==="TIGHTENING"){
    story="Yields are rising globally, indicating tightening financial conditions and potential upward pressure on rates.";
}

if(regime==="EASING"){
    story="Global yields are falling, suggesting easing conditions and possible shifts toward accommodative policy.";
}

if(regime==="DIVERGING"){
    story="Markets are mixed, with no clear global direction. Divergence signals uncertainty in macro conditions.";
}

/* ------------------ UI ------------------ */

const regimeEl = document.getElementById("regime");
regimeEl.innerText = regime;
regimeEl.className = "regime "+cls;

document.getElementById("conf").innerText =
"Confidence: "+confidence+"%";

document.getElementById("story").innerText = story;

const alertsEl = document.getElementById("alerts");

alerts.forEach(a=>{
    const el=document.createElement("div");
    el.className="alert "+a.level;
    el.innerText=a.text;
    alertsEl.appendChild(el);
});

}

load();

</script>

</body>
</html>
