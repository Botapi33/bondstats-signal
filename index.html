<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BondStats Signal</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
    background:#070b10;
    color:#e6edf3;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.wrapper{
    width:100%;
    max-width:420px;
    padding:20px;
}

.card{
    background:linear-gradient(180deg,#0d131a,#0a0f14);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:16px;
    padding:26px;
    box-shadow:0 25px 70px rgba(0,0,0,0.7);
}

/* HEADER */
.label{
    font-size:11px;
    letter-spacing:1.5px;
    color:#8b949e;
}

/* MAIN */
.main{
    font-size:28px;
    font-weight:700;
    margin-top:10px;
}

.rising{color:#3fb950;}
.falling{color:#f85149;}
.mixed{color:#9aa4b2;}

.coverage{
    font-size:14px;
    color:#9aa4b2;
    margin-top:6px;
}

/* HEATMAP (CLEAN!) */
.heatmap{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
    margin-top:20px;
}

.box{
    padding:6px;
    font-size:11px;
    text-align:center;
    border-radius:6px;
    cursor:pointer;
}

.box.up{background:rgba(63,185,80,0.15);}
.box.down{background:rgba(248,81,73,0.15);}
.box.flat{background:rgba(154,164,178,0.15);}

/* DETAIL */
.detail{
    margin-top:16px;
    font-size:13px;
    color:#c9d1d9;
}

/* LOADER */
.loader{
    width:18px;
    height:18px;
    border:3px solid #2a3643;
    border-top:3px solid #4da3ff;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-top:10px;
}

@keyframes spin{
    0%{transform:rotate(0);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="card">

<div class="label">BONDSTATS SIGNAL</div>

<div id="main" class="main">
    <div class="loader"></div>
</div>

<div id="coverage" class="coverage"></div>

<div id="heatmap" class="heatmap"></div>

<div id="detail" class="detail">
Click a country to see details
</div>

</div>

</div>

<script>

const API="https://botapi33.github.io/bondstats-global-yields/global_yields.json";

async function load(){

    try{

        const res = await fetch(API + "?t=" + Date.now());
        const data = await res.json();

        // 👉 FLEXIBLE STRUCTURE HANDLING
        const signal = data.signal || {};
        const countries = data.countries || data.data || {};

        const main = document.getElementById("main");
        const coverage = document.getElementById("coverage");
        const heatmap = document.getElementById("heatmap");
        const detail = document.getElementById("detail");

        // SIGNAL
        const direction = signal.direction || "Mixed";
        const strength = signal.strength || "Weak";

        main.innerText = direction.toUpperCase() + " • " + strength.toUpperCase();
        main.classList.add(direction.toLowerCase());

        if(signal.coverage){
            coverage.innerText = signal.coverage + "% of markets moving " + direction.toLowerCase();
        }

        // HEATMAP
        Object.values(countries).forEach(c=>{

            const name = c.label || c.country || "N/A";
            const change = c.change ?? 0;
            const value = c.value ?? "--";

            let cls = "flat";
            if(change > 0) cls = "up";
            if(change < 0) cls = "down";

            const el = document.createElement("div");
            el.className = "box " + cls;
            el.innerText = name.slice(0,3);

            el.onclick = ()=>{
                detail.innerHTML = `
                <b>${name}</b><br>
                Yield: ${value}%<br>
                Change: ${change}
                `;
            };

            heatmap.appendChild(el);
        });

    }catch(e){
        document.getElementById("main").innerText = "Error loading data";
    }
}

load();

</script>

</body>
</html>
