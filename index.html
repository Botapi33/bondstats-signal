<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BondStats Signal</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
    background:#070b10;
    color:#e6edf3;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* CONTAINER */
.wrapper{
    width:100%;
    max-width:420px;
    padding:20px;
}

/* CARD */
.signal-box{
    background:linear-gradient(180deg,#0d131a,#0a0f14);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:16px;
    padding:28px;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* HEADER */
.label{
    font-size:11px;
    letter-spacing:1.5px;
    color:#8b949e;
}

/* MAIN SIGNAL */
.main{
    font-size:28px;
    font-weight:700;
    margin-top:10px;
}

/* COLORS */
.rising{ color:#3fb950; }
.falling{ color:#f85149; }
.mixed{ color:#9aa4b2; }

/* COVERAGE */
.coverage{
    font-size:14px;
    color:#9aa4b2;
    margin-top:6px;
}

/* MOVERS */
.section{
    margin-top:22px;
    font-size:12px;
    color:#8b949e;
}

.movers{
    margin-top:10px;
    font-size:14px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border-bottom:1px solid rgba(255,255,255,0.04);
}

.row:last-child{border:none;}

.up{color:#3fb950;}
.down{color:#f85149;}

/* LOADER */
.loader{
    width:18px;
    height:18px;
    border:3px solid #2a3643;
    border-top:3px solid #4da3ff;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-top:10px;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="signal-box">

<div class="label">BONDSTATS SIGNAL</div>

<div id="mainSignal" class="main">
    <div class="loader"></div>
</div>

<div id="coverage" class="coverage"></div>

<div class="section">Top Movers</div>
<div id="movers" class="movers"></div>

</div>

</div>

<script>

const API = "https://botapi33.github.io/bondstats-global-yields/global_yields.json";

async function loadSignal(){
    try{
        const res = await fetch(API + "?t=" + Date.now());
        const data = await res.json();

        const s = data.signal;

        const main = document.getElementById("mainSignal");
        const coverage = document.getElementById("coverage");
        const movers = document.getElementById("movers");

        // MAIN TEXT
        main.innerHTML = s.direction.toUpperCase() + " • " + s.strength.toUpperCase();

        // COLOR
        main.classList.remove("rising","falling","mixed");
        main.classList.add(s.direction.toLowerCase());

        // COVERAGE
        coverage.innerText =
            s.coverage + "% of markets moving " + s.direction.toLowerCase();

        // MOVERS
        let html = "";

        s.topMovers.forEach(m=>{
            const cls = m.change >= 0 ? "up" : "down";
            const sign = m.change > 0 ? "+" : "";

            html += `
            <div class="row">
                <div>${m.country}</div>
                <div class="${cls}">${sign}${m.change}%</div>
            </div>`;
        });

        movers.innerHTML = html;

    }catch(e){
        document.getElementById("mainSignal").innerText = "Signal unavailable";
    }
}

loadSignal();

</script>

</body>
</html>
